<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body class="loaded">

    <div class="admin-container">

        <div id="adminPanel">
            <h2>Admin Panel</h2>

            <div class="admin-controls">
                <span id="totalCount">Total: 0</span>

                <select id="sortSelect" onchange="loadSelections()">
                    <option value="desc">Nyeste først</option>
                    <option value="asc">Ældste først</option>
                </select>
            </div>

            <div id="results"></div>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
